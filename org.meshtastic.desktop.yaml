id: org.meshtastic.desktop
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk17
command: meshtastic-wrapper.sh

finish-args:
  - --share=ipc
  # Allow the app to communicate with the X server
  - --socket=x11
  # Required for CH341 USB radio
  - --device=all
  # Needs network access
  - --share=network
  # Status tray / noficiations support
  - --talk-name=org.kde.StatusNotifierWatcher
  # Allow bluetooth if available
  - --allow=bluetooth
  - --system-talk-name=org.bluez.*
  # Set env for OpenJDK
  - --env=PATH=/app/jre/bin:/app/bin:/usr/bin
  - --env=JAVA_HOME=/app/jre

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk17/install.sh

  - name: meshtastic-wrapper
    buildsystem: simple
    build-commands:
      - install -Dm755 meshtastic-wrapper.sh /app/bin/meshtastic-wrapper.sh
    sources:
      - type: file
        path: meshtastic-wrapper.sh

  - name: meshtastic-desktop
    buildsystem: simple
    build-options:
      build-args:
        # Allow internet access at build time (big no-no on FlatHub)
        - --share=network
      env:
        PATH: /app/bin:/usr/bin:/usr/lib/sdk/openjdk17/bin
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
    build-commands:
      # Install desktop metadata
      - install -Dm644 -t /app/share/icons/hicolor/scalable/apps org.meshtastic.desktop.svg
      - install -Dm644 -t /app/share/applications org.meshtastic.desktop.desktop
      - install -Dm644 -t /app/share/metainfo org.meshtastic.desktop.metainfo.xml
      # Build!
      - ./gradlew :desktop:packageUberJarForCurrentOS
      - >
        JAR_FILE=$(find desktop/build/compose/jars/ -name "*.jar" -type f | head -1)
        && install -Dm755 "$JAR_FILE" /app/lib/meshtastic-desktop.jar
    sources:
      - type: file
        path: org.meshtastic.desktop.desktop
      - type: file
        path: org.meshtastic.desktop.metainfo.xml
      - type: file
        path: org.meshtastic.desktop.svg
      - type: git
        # url: https://github.com/vidplace7/Meshtastic-Android.git
        # commit: b3b2e97e911f51d5ce151527ff3316c63c3ce050
        url: https://github.com/meshtastic/Meshtastic-Android.git
        tag: v2.7.14-closed.3
        commit: 9ad28e924f40e0e093abefce25c2f3bd5d4ad931
        x-checker-data:
          is-main-source: true
          type: json
          url: https://api.github.com/repos/meshtastic/Meshtastic-Android/releases/latest
          timestamp-query: .published_at
          tag-query: .tag_name
          version-query: $tag | sub("^v"; "")
      # - flatpak-sources.json
    modules:
      - name: gradle
        buildsystem: simple
        cleanup:
          - '*.bat'
        sources:
          - type: file
            url: https://services.gradle.org/distributions/gradle-9.4.0-bin.zip
            dest-filename: gradle-bin.zip
            sha256: 60ea723356d81263e8002fec0fcf9e2b0eee0c0850c7a3d7ab0a63f2ccc601f3
            x-checker-data:
              type: json
              url: https://services.gradle.org/versions/current
              is-main-source: false
              version-query: .version
              url-query: .downloadUrl
        build-commands:
          - unzip -q gradle-bin.zip -d $FLATPAK_DEST
          - mv $FLATPAK_DEST/gradle-* $FLATPAK_DEST/gradle
          - ln -s $FLATPAK_DEST/gradle/bin/gradle $FLATPAK_DEST/bin
